<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Answer Book</title>
  <style>
    body {
      margin: 0;
      background-color: rgb(0, 0, 0); 
      display: flex;
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      width: 100vw;
      font-family: 'Georgia', serif;
      color: #222;
    }

    .book-container {
      position: relative;
      width: 400px;
      height: 500px; 
      background: url('assets/book.jpg') no-repeat center/contain; 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 150px; 
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    }

    input {
      width: 200px;
      padding: 10px;
      font-size: 18px;
      margin-bottom: 10px;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }

    #result {
      margin-top: 50px;
      width: 80%;
      text-align: center;
      font-size: 20px;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="book-container">
    <input id="pageInput" type="number" placeholder="Enter page number">
    <button onclick="getAdvice()">Open</button>
    <p id="result"></p>
  </div>

  <script src="sketch.js"></script>
</body>
</html>
